an><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">build</span><span class="params">(ll l,ll r,ll s)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(l==r)&#123;</span><br><span class="line">        t[s]=a[l];</span><br><span class="line">        <span class="keyword">return</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">build</span>(l,(l+r)&gt;&gt;<span class="number">1</span>,s*<span class="number">2</span>);</span><br><span class="line">    <span class="built_in">build</span>(((l+r)&gt;&gt;<span class="number">1</span>)<span class="number">+1</span>,r,s*<span class="number">2</span><span class="number">+1</span>);</span><br><span class="line">    <span class="built_in">pushup</span>(s);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function">ll <span class="title">query</span><span class="params">(ll l,ll r,ll L,ll R,ll s)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(<span class="built_in">InRange</span>(l,r,L,R))&#123;</span><br><span class="line">        <span class="keyword">return</span> t[s];</span><br><span class="line">    &#125;<span class="keyword">else</span> <span class="keyword">if</span>(!<span class="built_in">OutRange</span>(l,r,L,R))&#123;</span><br><span class="line">        <span class="built_in">pushdown</span>(L,R,s);</span><br><span class="line">        <span class="keyword">return</span> <span class="built_in">query</span>(l,r,L,(L+R)/<span class="number">2</span>,s*<span class="number">2</span>)+<span class="built_in">query</span>(l,r,(L+R)/<span class="number">2</span><span class="number">+1</span>,R,s*<span class="number">2</span><span class="number">+1</span>);</span><br><span class="line">    &#125;<span class="keyword">else</span> <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">void</span> <span class="title">update</span><span class="params">(ll l,ll r,ll L,ll R,ll s,ll x)</span></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(<span class="built_in">InRange</span>(l,r,L,R))&#123;</span><br><span class="line">        <span class="built_in">makeTag</span>(s,x,R-L<span class="number">+1</span>);</span><br><span class="line">    &#125;<span class="keyword">else</span> <span class="keyword">if</span>(!<span class="built_in">OutRange</span>(l,r,L,R))&#123;</span><br><span class="line">        <span class="built_in">pushdown</span>(L,R,s);</span><br><span class="line">        <span class="built_in">update</span>(l,r,L,(L+R)/<span class="number">2</span>,s*<span class="number">2</span>,x);</span><br><span class="line">        <span class="built_in">update</span>(l,r,(R+L)/<span class="number">2</span><span class="number">+1</span>,R,s*<span class="number">2</span><span class="number">+1</span>,x);</span><br><span class="line">        <span class="built_in">pushup</span>(s);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    ios::<span class="built_in">sync_with_stdio</span>(<span class="number">0</span>);</span><br><span class="line">    cin.<span class="built_in">tie</span>(<span class="number">0</span>);cout.<span class="built_in">tie</span>(<span class="number">0</span>);</span><br><span class="line">    cin&gt;&gt;n&gt;&gt;m;</span><br><span class="line">    <span class="keyword">for</span>(ll i=<span class="number">1</span>;i&lt;=n;i++)cin&gt;&gt;a[i];</span><br><span class="line">    <span class="built_in">build</span>(<span class="number">1</span>,n,<span class="number">1</span>);</span><br><span class="line">    <span class="keyword">while</span>(m--)&#123;</span><br><span class="line">        cin&gt;&gt;opt;</span><br><span class="line">        <span class="keyword">if</span>(opt==<span class="number">1</span>)&#123;</span><br><span class="line">            cin&gt;&gt;x&gt;&gt;y&gt;&gt;k;</span><br><span class="line">            <span class="built_in">update</span>(x,y,<span class="number">1</span>,n,<span class="number">1</span>,k);</span><br><span class="line">        &#125;<span class="keyword">else</span>&#123;</span><br><span class="line">            cin&gt;&gt;x&gt;&gt;y;</span><br><span class="line">            ll ans=<span class="built_in">query</span>(x,y,<span class="number">1</span>,n,<span class="number">1</span>);</span><br><span class="line">            cout&lt;&lt;ans&lt;&lt;endl;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
